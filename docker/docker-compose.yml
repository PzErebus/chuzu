version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - chuzu-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/chuzu.db
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    networks:
      - chuzu-network

volumes:
  db-data:
    driver: local

networks:
  chuzu-network:
    driver: bridge
